<div class="container">

  <h2>📄 My Loan Applications</h2>

  <table class="loan-table">

    <thead>
      <tr>
        <th>ID</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let loan of loans">
        <td>{{ loan.id }}</td>
        <td>₹ {{ loan.amount }}</td>
        <td>{{ loan.status }}</td>
      </tr>
    </tbody>

  </table>

</div>
