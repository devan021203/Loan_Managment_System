<div class="form-container">

  <h2>Apply Loan</h2>

  <Label>USER NAME</Label>
  <input type="text" placeholder="user Name" [(ngModel)]="loan.user_name">
  <br>
  <Label>CITY</Label>
  <input type="text" placeholder="city" [(ngModel)]="loan.city">
  <br>
   <Label>AMOUNT</Label>
  <input type="text" placeholder="Amount" [(ngModel)]="loan.amount">
  <br>
  <button (click)="apply()">Submit</button>

</div>
