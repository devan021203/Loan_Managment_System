<div class="dashboard">

  <!-- TOP HEADER -->
  <div class="top-header">

    <div class="title">
      <h1>🏦 User Profile</h1>
    </div>

    <div class="actions">
      <div class="profile-card">
        <h3></h3>
        <p><strong>Username:</strong> {{ username }}</p>
      </div>

      <button class="btn-primary" (click)="goToApplyLoan()">
        + Apply Loan
      </button>

       <button class="btn-logout" (click)="logout()">
        Logout
      </button>
    </div>

  </div>

  <!-- STATS -->
  <div class="cards">

    <div class="card">
      <h3>Total Loans</h3>
      <p>{{ loans.length }}</p>
    </div>

    <div class="card pending">
      <h3>Pending</h3>
      <p>{{ pendingCount }}</p>
    </div>

    <div class="card approved">
      <h3>Approved</h3>
      <p>{{ approvedCount }}</p>
    </div>

  </div>

  <!-- TABLE -->
  <div class="table-container">

    <h2>Loan Applications</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <!-- <th>Name</th> -->
          <th>City</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        @for (loan of loans; track loan.id) {
          <tr>
            <td>{{ loan.id }}</td>
            <!-- <td>{{ loan.user_loan_id }}</td>    -->
            <td>{{ loan.city }}</td>
            <td>₹ {{ loan.amount }}</td>

            <td>
              <span class="badge" [ngClass]="loan.status.toLowerCase()">
                {{ loan.status }}
              </span>
            </td>
          </tr>
        }
      </tbody>

    </table>

  </div>

</div>
